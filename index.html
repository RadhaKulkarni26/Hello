<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle Apology</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:'Comic Sans MS',cursive;
background:linear-gradient(135deg,#ffd6e0,#ffe6cc);
overflow:hidden;
text-align:center;
}

h1{
color:#444;
margin-bottom:10px;
font-size:6vw;
}

/* Puzzle board */

.board{
display:grid;
grid-template-columns:repeat(5,18vw);
gap:2vw;
margin-top:30px;
}

.target{
width:18vw;
height:18vw;
}

/* Puzzle pieces */

.piece{
width:18vw;
height:18vw;
background:white;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
font-size:8vw;
font-weight:bold;
color:#ff4d6d;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
position:absolute;
transition:all 2s ease;
}

/* Glow animation */

.glow{
animation:glow 1.2s ease-in-out infinite alternate;
}

@keyframes glow{
from{
box-shadow:0 0 10px #ff4d6d;
}
to{
box-shadow:0 0 35px #ff4d6d, 0 0 60px pink;
}
}

/* Flip animation */

.flip{
animation:flip 1s forwards;
}

@keyframes flip{
0%{transform:rotateY(0)}
100%{transform:rotateY(180deg)}
}

/* Floating emojis */

.float{
position:absolute;
font-size:28px;
animation:floatUp 6s linear infinite;
}

@keyframes floatUp{

from{
transform:translateY(0);
opacity:0;
}

10%{opacity:1}

to{
transform:translateY(-110vh);
opacity:0;
}

}

.line{
margin-top:20px;
font-size:4.5vw;
color:#555;
font-weight:bold;
}

</style>
</head>

<body>

<h1>Putting the messed up pieces together…</h1>

<div class="board" id="board">
<div class="target"></div>
<div class="target"></div>
<div class="target"></div>
<div class="target"></div>
<div class="target"></div>
</div>

<div class="line">
I really mean it.
</div>

<script>

const letters=["S","O","R","R","Y"];
const pieces=[];

/* create scattered pieces */

letters.forEach(letter=>{

const p=document.createElement("div");
p.className="piece";
p.innerText=letter;

p.style.left=Math.random()*80+"vw";
p.style.top=Math.random()*80+"vh";

document.body.appendChild(p);

pieces.push(p);

});

/* assemble puzzle */

setTimeout(()=>{

const targets=document.querySelectorAll(".target");

pieces.forEach((p,i)=>{

const rect=targets[i].getBoundingClientRect();

p.style.left=rect.left+"px";
p.style.top=rect.top+"px";

});

/* glow after assembling */

setTimeout(()=>{
pieces.forEach(p=>p.classList.add("glow"));
},500);

},2000);


/* flip to hearts */

setTimeout(()=>{

pieces.forEach(p=>{

p.classList.add("flip");
p.innerText="❤️";

});

},6000);


/* floating flowers */

function floatThings(){

const emojis=["🌸","🌼","🌺","✨","💖"];

for(let i=0;i<6;i++){

const e=document.createElement("div");
e.className="float";
e.innerText=emojis[Math.floor(Math.random()*emojis.length)];

e.style.left=Math.random()*100+"vw";
e.style.bottom="-20px";

document.body.appendChild(e);

setTimeout(()=>e.remove(),6000);

}

}

setInterval(floatThings,900);

</script>

</body>
</html>
