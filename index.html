<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Puzzle Apology</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:'Comic Sans MS',cursive;
background:linear-gradient(135deg,#ffd6e0,#ffe6cc);
overflow:hidden;
text-align:center;
}

h1{
color:#444;
margin-bottom:10px;
}

.board{
display:grid;
grid-template-columns:repeat(5,120px);
gap:20px;
margin-top:40px;
}

.target{
width:120px;
height:120px;
}

.piece{
width:120px;
height:120px;
background:white;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
font-size:60px;
font-weight:bold;
color:#ff4d6d;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
position:absolute;
transition:all 2s ease;
}

.flip{
animation:flip 1s forwards;
}

@keyframes flip{
0%{transform:rotateY(0)}
100%{transform:rotateY(180deg)}
}

.float{
position:absolute;
font-size:28px;
animation:floatUp 6s linear infinite;
}

@keyframes floatUp{

from{
transform:translateY(0);
opacity:0;
}

10%{opacity:1}

to{
transform:translateY(-110vh);
opacity:0;
}

}

.line{
margin-top:25px;
font-size:24px;
color:#555;
font-weight:bold;
}

</style>
</head>

<body>

<h1>Putting the messed up  pieces together…</h1>

<div class="board" id="board">
<div class="target"></div>
<div class="target"></div>
<div class="target"></div>
<div class="target"></div>
<div class="target"></div>
</div>

<div class="line">
I really mean it.
</div>

<script>

const letters=["S","O","R","R","Y"];
const pieces=[];

letters.forEach(letter=>{

const p=document.createElement("div");
p.className="piece";
p.innerText=letter;

p.style.left=Math.random()*80+"vw";
p.style.top=Math.random()*80+"vh";

document.body.appendChild(p);

pieces.push(p);

});

/* assemble puzzle */

setTimeout(()=>{

const targets=document.querySelectorAll(".target");

pieces.forEach((p,i)=>{

const rect=targets[i].getBoundingClientRect();

p.style.left=rect.left+"px";
p.style.top=rect.top+"px";

});

},2000);


/* flip to heart */

setTimeout(()=>{

pieces.forEach(p=>{

p.classList.add("flip");
p.innerText="❤️";

});

},4500);



/* floating flowers */

function floatThings(){

const emojis=["🌸","🌼","🌺","✨","💖"];

for(let i=0;i<6;i++){

const e=document.createElement("div");
e.className="float";
e.innerText=emojis[Math.floor(Math.random()*emojis.length)];

e.style.left=Math.random()*100+"vw";
e.style.bottom="-20px";

document.body.appendChild(e);

setTimeout(()=>e.remove(),6000);

}

}

setInterval(floatThings,900);

</script>

</body>
</html>
